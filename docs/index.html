<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Chain Knowledge Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e7ff;
      overflow: hidden;
      height: 100vh;
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(10, 14, 39, 0.9);
      border-bottom: 1px solid rgba(139, 69, 19, 0.3);
      padding: 1.5rem 2rem;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ff8c42 0%, #ffa500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .search-container {
      flex: 1;
      max-width: 400px;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(51, 65, 102, 0.5);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 8px;
      color: #e0e7ff;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: rgba(224, 231, 255, 0.5);
    }

    .search-input:focus {
      outline: none;
      background: rgba(51, 65, 102, 0.8);
      border-color: #ff8c42;
      box-shadow: 0 0 20px rgba(255, 140, 66, 0.2);
    }

    .controls {
      display: flex;
      gap: 0.5rem;
    }

    button {
      padding: 0.6rem 1rem;
      background: rgba(139, 69, 19, 0.4);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 6px;
      color: #e0e7ff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    button:hover {
      background: rgba(255, 140, 66, 0.2);
      border-color: #ff8c42;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #graphContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .node {
      cursor: pointer;
      stroke-width: 2px;
      transition: all 0.2s ease;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }

    .node:hover {
      stroke-width: 3px;
      filter: drop-shadow(0 6px 20px rgba(255, 140, 66, 0.5));
    }

    .node-label {
      font-size: 12px;
      font-weight: 500;
      text-anchor: middle;
      pointer-events: none;
      fill: #e0e7ff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .node:hover + .node-label,
    .node-label.visible {
      opacity: 1;
    }

    .link {
      stroke: rgba(139, 69, 19, 0.3);
      stroke-width: 1.5px;
      opacity: 0.3;
      transition: all 0.2s ease;
    }

    .link.active {
      stroke: #ff8c42;
      opacity: 0.8;
      stroke-width: 2.5px;
      filter: drop-shadow(0 0 4px rgba(255, 140, 66, 0.4));
    }

    /* Content Drawer */
    .content-drawer {
      width: 0;
      max-width: 500px;
      background: rgba(10, 14, 39, 0.95);
      border-left: 1px solid rgba(255, 165, 0, 0.3);
      overflow-y: auto;
      transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .content-drawer.open {
      width: 500px;
    }

    .drawer-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 165, 0, 0.2);
      flex-shrink: 0;
    }

    .drawer-header h2 {
      color: #ff8c42;
      margin-bottom: 0.5rem;
      font-size: 1.3rem;
    }

    .drawer-meta {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.8rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(255, 140, 66, 0.2);
      border: 1px solid #ff8c42;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #ff8c42;
    }

    .drawer-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      min-height: 200px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 140, 66, 0.3) transparent;
    }

    .drawer-content::-webkit-scrollbar {
      width: 8px;
    }

    .drawer-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .drawer-content::-webkit-scrollbar-thumb {
      background: rgba(255, 140, 66, 0.3);
      border-radius: 4px;
    }

    .drawer-content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 140, 66, 0.5);
    }

    .drawer-content h1 {
      color: #ff8c42;
      font-size: 1.4rem;
      margin-bottom: 1rem;
      margin-top: 0;
      background: none;
      -webkit-text-fill-color: unset;
    }

    .drawer-content h2 {
      color: #ffa500;
      font-size: 1.1rem;
      margin: 1.5rem 0 0.8rem 0;
      border-bottom: 1px solid rgba(255, 165, 0, 0.2);
      padding-bottom: 0.5rem;
    }

    .drawer-content h3 {
      color: #ff8c42;
      font-size: 1rem;
      margin: 1rem 0 0.5rem 0;
    }

    .drawer-content p {
      line-height: 1.6;
      color: rgba(224, 231, 255, 0.9);
      margin-bottom: 1rem;
    }

    .drawer-content ul,
    .drawer-content ol {
      margin: 1rem 0 1rem 1.5rem;
      color: rgba(224, 231, 255, 0.9);
    }

    .drawer-content li {
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .drawer-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    .drawer-content th,
    .drawer-content td {
      border: 1px solid rgba(255, 165, 0, 0.2);
      padding: 0.5rem;
      text-align: left;
    }

    .drawer-content th {
      background: rgba(255, 140, 66, 0.1);
      color: #ff8c42;
    }

    .drawer-content code {
      background: rgba(51, 65, 102, 0.5);
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      color: #ffa500;
      font-family: 'Courier New', monospace;
    }

    .drawer-content strong {
      color: #ffa500;
    }

    .related-nodes {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 165, 0, 0.2);
      flex-shrink: 0;
    }

    .related-nodes h4 {
      color: #ff8c42;
      font-size: 0.95rem;
      margin-bottom: 0.8rem;
    }

    .related-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .related-link {
      padding: 0.6rem 0.8rem;
      background: rgba(255, 140, 66, 0.1);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 4px;
      color: #ff8c42;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      text-align: left;
    }

    .related-link:hover {
      background: rgba(255, 140, 66, 0.2);
      border-color: #ff8c42;
    }

    .close-drawer {
      padding: 0.5rem 0.8rem;
      background: rgba(255, 140, 66, 0.15);
      border: 1px solid rgba(255, 140, 66, 0.4);
      color: #ff8c42;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 1rem;
    }

    .close-drawer:hover {
      background: rgba(255, 140, 66, 0.25);
    }

    .stats {
      position: fixed;
      top: 5rem;
      left: 2rem;
      background: rgba(10, 14, 39, 0.95);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0.5rem 0;
      gap: 1rem;
    }

    .stat-label {
      color: rgba(224, 231, 255, 0.7);
    }

    .stat-value {
      color: #ff8c42;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* Type-specific colors */
    .node-moc {
      fill: #8b6f47;
      stroke: #ffa500;
    }

    .node-concept {
      fill: #3d5a80;
      stroke: #6da8d6;
    }

    .node-clip {
      fill: #4a3728;
      stroke: #d4a574;
    }

    .node-plan {
      fill: #3a5a4a;
      stroke: #7ec586;
    }

    .node-brainstorm {
      fill: #5a3a5a;
      stroke: #c77dcc;
    }

    .legend {
      position: fixed;
      top: 5rem;
      right: 2rem;
      background: rgba(10, 14, 39, 0.95);
      border: 1px solid rgba(255, 165, 0, 0.3);
      border-radius: 8px;
      padding: 1rem;
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    .legend-title {
      color: #ff8c42;
      font-weight: 600;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: rgba(224, 231, 255, 0.8);
    }

    .legend-circle {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @media (max-width: 1024px) {
      .content-drawer.open {
        width: 100%;
      }

      .stats,
      .legend {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <header>
      <div class="header-content">
        <h1>Build Chain Knowledge Graph</h1>
        <div class="search-container">
          <input type="text" class="search-input" id="search" placeholder="Search concepts...">
        </div>
        <div class="controls">
          <button id="resetBtn">Reset View</button>
          <button id="togglePhysics">Physics: ON</button>
        </div>
      </div>
    </header>

    <div class="main-content">
      <div id="graphContainer"></div>

      <div class="content-drawer" id="drawer">
        <div class="drawer-header">
          <button class="close-drawer" id="closeDrawer">← Close</button>
          <h2 id="drawerTitle"></h2>
          <div class="drawer-meta" id="drawerMeta"></div>
        </div>
        <div class="drawer-content" id="drawerContent"></div>
        <div class="related-nodes" id="relatedNodes"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Concepts</span>
        <span class="stat-value" id="nodeCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Connections</span>
        <span class="stat-value" id="linkCount">0</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-title">Node Types</div>
      <div class="legend-item">
        <div class="legend-circle" style="background: #8b6f47; border: 2px solid #ffa500;"></div>
        <span>MOC</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle" style="background: #3d5a80; border: 2px solid #6da8d6;"></div>
        <span>Concept</span>
      </div>
    </div>
  </div>

  <script src="graph-data.js"></script>
  <script>
    // Simple markdown to HTML converter
    function simpleMarkdown(text) {
      if (!text) return '';
      let html = text;

      // Headers
      html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

      // Bold
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/_(.*?)_/g, '<em>$1</em>');

      // Links
      html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

      // Inline code
      html = html.replace(/`(.*?)`/g, '<code>$1</code>');

      // Line breaks
      html = html.replace(/\n\n+/g, '</p><p>');
      html = '<p>' + html + '</p>';

      // Lists
      html = html.replace(/\n- (.*?)(\n|$)/g, '<li>$1</li>');
      html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');

      return html;
    }

    const width = document.getElementById('graphContainer').clientWidth;
    const height = document.getElementById('graphContainer').clientHeight;

    const svg = d3.select('#graphContainer')
      .append('svg')
      .attr('width', width)
      .attr('height', height);

    svg.append('defs').append('marker')
      .attr('id', 'arrowhead')
      .attr('markerWidth', 10)
      .attr('markerHeight', 10)
      .attr('refX', 20)
      .attr('refY', 3)
      .attr('orient', 'auto')
      .append('polygon')
      .attr('points', '0 0, 10 3, 0 6')
      .attr('fill', '#ff8c42');

    const g = svg.append('g');

    let simulation = d3.forceSimulation(graphData.nodes)
      .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(100))
      .force('charge', d3.forceManyBody().strength(-400))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(40));

    const zoom = d3.zoom()
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
      });

    svg.call(zoom);

    const link = g.selectAll('.link')
      .data(graphData.links)
      .enter()
      .append('line')
      .attr('class', 'link');

    const node = g.selectAll('.node')
      .data(graphData.nodes)
      .enter()
      .append('circle')
      .attr('class', d => `node node-${d.type.toLowerCase()}`)
      .attr('r', d => d.type === 'MOC' ? 16 : 12)
      .call(d3.drag()
        .on('start', dragStarted)
        .on('drag', dragged)
        .on('end', dragEnded));

    const labels = g.selectAll('.node-label')
      .data(graphData.nodes)
      .enter()
      .append('text')
      .attr('class', 'node-label')
      .attr('dy', d => d.type === 'MOC' ? -24 : -18)
      .text(d => d.id);

    document.getElementById('nodeCount').textContent = graphData.nodes.length;
    document.getElementById('linkCount').textContent = graphData.links.length;

    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node
        .attr('cx', d => d.x = Math.max(30, Math.min(width - 30, d.x)))
        .attr('cy', d => d.y = Math.max(30, Math.min(height - 30, d.y)));

      labels
        .attr('x', d => d.x)
        .attr('y', d => d.y);
    });

    function showNodeContent(d) {
      const drawer = document.getElementById('drawer');
      const contentDiv = document.getElementById('drawerContent');

      document.getElementById('drawerTitle').textContent = d.id;
      document.getElementById('drawerMeta').innerHTML = `<span class="badge">${d.type.toUpperCase()}</span><span class="badge">${d.category}</span>`;

      // Clear and render content
      if (d.content) {
        const html = simpleMarkdown(d.content);
        contentDiv.innerHTML = html;
      } else {
        contentDiv.innerHTML = '<p>No content available for this node.</p>';
      }

      const connections = graphData.links.filter(link =>
        link.source === d || link.target === d
      ).map(link => link.source === d ? link.target : link.source);

      if (connections.length > 0) {
        const relatedHtml = `
          <h4>Connected Concepts</h4>
          <div class="related-links">
            ${connections.map(node => `
              <button class="related-link" onclick="loadNode('${node.id}')">${node.id}</button>
            `).join('')}
          </div>
        `;
        document.getElementById('relatedNodes').innerHTML = relatedHtml;
      } else {
        document.getElementById('relatedNodes').innerHTML = '';
      }

      drawer.classList.add('open');
      highlightConnections(d);
    }

    function loadNode(nodeId) {
      const node = graphData.nodes.find(n => n.id === nodeId);
      if (node) showNodeContent(node);
    }

    function highlightConnections(node) {
      link.classed('active', d => d.source === node || d.target === node);
    }

    node.on('click', (event, d) => {
      event.stopPropagation();
      showNodeContent(d);
    });

    node.on('mouseenter', (event, d) => {
      labels.filter(label => label === d).classed('visible', true);
    });

    node.on('mouseleave', (event, d) => {
      labels.filter(label => label === d).classed('visible', false);
    });

    document.getElementById('closeDrawer').addEventListener('click', () => {
      document.getElementById('drawer').classList.remove('open');
      link.classed('active', false);
    });

    document.getElementById('search').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      node.style('opacity', d => {
        return d.id.toLowerCase().includes(query) ? 1 : 0.1;
      });
      labels.style('opacity', d => {
        return d.id.toLowerCase().includes(query) ? 1 : 0;
      }).classed('visible', d => d.id.toLowerCase().includes(query));
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      svg.transition()
        .duration(750)
        .call(zoom.transform, d3.zoomIdentity.translate(50, 50));
      document.getElementById('search').value = '';
      node.style('opacity', 1);
      link.classed('active', false);
      document.getElementById('drawer').classList.remove('open');
    });

    let physicsOn = true;
    document.getElementById('togglePhysics').addEventListener('click', (e) => {
      physicsOn = !physicsOn;
      if (physicsOn) {
        simulation.alpha(1).restart();
        e.target.textContent = 'Physics: ON';
      } else {
        simulation.stop();
        e.target.textContent = 'Physics: OFF';
      }
    });

    function dragStarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    window.addEventListener('resize', () => {
      const newWidth = document.getElementById('graphContainer').clientWidth;
      const newHeight = document.getElementById('graphContainer').clientHeight;
      svg.attr('width', newWidth).attr('height', newHeight);
      simulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2));
    });

    // Make loadNode global for onclick handlers
    window.loadNode = loadNode;
  </script>
</body>
</html>
